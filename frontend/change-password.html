<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Change Password - Simple Notes</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto,
          Oxygen, Ubuntu, Cantarell, sans-serif;
        background-color: #1a1a2e;
        color: #eee;
        min-height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
      }

      .container {
        background-color: #16213e;
        padding: 2rem;
        border-radius: 12px;
        box-shadow: 0 4px 20px rgba(0, 0, 0, 0.3);
        width: 100%;
        max-width: 400px;
      }

      h1 {
        text-align: center;
        margin-bottom: 1.5rem;
        color: #fff;
        font-size: 1.5rem;
      }

      .form-group {
        margin-bottom: 1rem;
      }

      label {
        display: block;
        margin-bottom: 0.5rem;
        color: #aaa;
        font-size: 0.9rem;
      }

      input {
        width: 100%;
        padding: 0.75rem;
        border: 1px solid #333;
        border-radius: 6px;
        background-color: #0f0f23;
        color: #fff;
        font-size: 1rem;
      }

      input:focus {
        outline: none;
        border-color: #4a9eff;
      }

      .btn {
        width: 100%;
        padding: 0.75rem;
        border: none;
        border-radius: 6px;
        font-size: 1rem;
        cursor: pointer;
        margin-top: 0.5rem;
        transition: background-color 0.2s;
      }

      .btn-primary {
        background-color: #4a9eff;
        color: #fff;
      }

      .btn-primary:hover {
        background-color: #3a8eef;
      }

      .btn-secondary {
        background-color: #333;
        color: #fff;
      }

      .btn-secondary:hover {
        background-color: #444;
      }

      .error-message {
        background-color: #ff4444;
        color: #fff;
        padding: 0.75rem;
        border-radius: 6px;
        margin-bottom: 1rem;
        display: none;
        text-align: center;
      }

      .success-message {
        background-color: #44aa44;
        color: #fff;
        padding: 0.75rem;
        border-radius: 6px;
        margin-bottom: 1rem;
        display: none;
        text-align: center;
      }

      .links {
        text-align: center;
        margin-top: 1rem;
      }

      .links a {
        color: #4a9eff;
        text-decoration: none;
      }

      .links a:hover {
        text-decoration: underline;
      }

      .password-requirements {
        font-size: 0.8rem;
        color: #888;
        margin-top: 0.25rem;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <h1>🔐 Change Password</h1>

      <div id="errorMessage" class="error-message"></div>
      <div id="successMessage" class="success-message"></div>

      <div class="form-group">
        <label for="currentPassword">Current Password</label>
        <input
          type="password"
          id="currentPassword"
          placeholder="Enter current password"
        />
      </div>

      <div class="form-group">
        <label for="newPassword">New Password</label>
        <input
          type="password"
          id="newPassword"
          placeholder="Enter new password"
        />
        <p class="password-requirements">Must be at least 8 characters</p>
      </div>

      <div class="form-group">
        <label for="confirmPassword">Confirm New Password</label>
        <input
          type="password"
          id="confirmPassword"
          placeholder="Confirm new password"
        />
      </div>

      <button id="changePasswordBtn" class="btn btn-primary">
        Change Password
      </button>
      <button id="backBtn" class="btn btn-secondary">Back to Notes</button>

      <div class="links">
        <a href="/" id="homeLink">← Back to Home</a>
      </div>
    </div>

    <script>
      document.addEventListener("DOMContentLoaded", () => {
        const currentPasswordInput = document.getElementById("currentPassword");
        const newPasswordInput = document.getElementById("newPassword");
        const confirmPasswordInput = document.getElementById("confirmPassword");
        const changePasswordBtn = document.getElementById("changePasswordBtn");
        const backBtn = document.getElementById("backBtn");
        const errorMessage = document.getElementById("errorMessage");
        const successMessage = document.getElementById("successMessage");

        // Check authentication
        const checkAuth = async () => {
          try {
            const response = await fetch("/api/auth/me");
            if (!response.ok) {
              // Not authenticated, redirect to login
              window.location.href = "/login.html";
            }
          } catch (error) {
            window.location.href = "/login.html";
          }
        };

        // Validate form
        const validateForm = () => {
          errorMessage.style.display = "none";
          successMessage.style.display = "none";

          const currentPassword = currentPasswordInput.value;
          const newPassword = newPasswordInput.value;
          const confirmPassword = confirmPasswordInput.value;

          if (!currentPassword || !newPassword || !confirmPassword) {
            errorMessage.textContent = "All fields are required";
            errorMessage.style.display = "block";
            return false;
          }

          if (newPassword.length < 8) {
            errorMessage.textContent =
              "New password must be at least 8 characters";
            errorMessage.style.display = "block";
            return false;
          }

          if (newPassword !== confirmPassword) {
            errorMessage.textContent = "New passwords do not match";
            errorMessage.style.display = "block";
            return false;
          }

          if (currentPassword === newPassword) {
            errorMessage.textContent =
              "New password must be different from current password";
            errorMessage.style.display = "block";
            return false;
          }

          return true;
        };

        // Change password
        const changePassword = async () => {
          if (!validateForm()) return;

          const currentPassword = currentPasswordInput.value;
          const newPassword = newPasswordInput.value;

          try {
            changePasswordBtn.disabled = true;
            changePasswordBtn.textContent = "Changing...";

            const response = await fetch("/api/auth/change-password", {
              method: "POST",
              headers: { "Content-Type": "application/json" },
              body: JSON.stringify({ currentPassword, newPassword }),
            });

            const data = await response.json();

            if (response.ok) {
              successMessage.textContent = "Password changed successfully!";
              successMessage.style.display = "block";
              errorMessage.style.display = "none";

              // Clear form
              currentPasswordInput.value = "";
              newPasswordInput.value = "";
              confirmPasswordInput.value = "";

              // Redirect after a short delay
              setTimeout(() => {
                window.location.href = "/";
              }, 2000);
            } else {
              errorMessage.textContent =
                data.error || "Failed to change password";
              errorMessage.style.display = "block";
            }
          } catch (error) {
            console.error("Change password error:", error);
            errorMessage.textContent = "An error occurred. Please try again.";
            errorMessage.style.display = "block";
          } finally {
            changePasswordBtn.disabled = false;
            changePasswordBtn.textContent = "Change Password";
          }
        };

        // Event listeners
        changePasswordBtn.addEventListener("click", changePassword);

        backBtn.addEventListener("click", () => {
          window.location.href = "/";
        });

        // Handle Enter key on last field
        confirmPasswordInput.addEventListener("keypress", (e) => {
          if (e.key === "Enter") {
            changePassword();
          }
        });

        // Check auth on load
        checkAuth();
      });
    </script>
  </body>
</html>
